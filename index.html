<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance Mode</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    height:100vh;
    background:
        radial-gradient(circle at top,#6d28d9 0%,#0f172a 40%,#020617 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    position:relative;
}

.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

.anime-glow{
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    background:radial-gradient(circle,
        rgba(168,85,247,.35),
        rgba(99,102,241,.08),
        transparent 70%);
    filter:blur(20px);
    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

.container{
    position:relative;
    z-index:10;
    text-align:center;
    max-width:900px;
    padding:30px;
}

.logo{
    font-size:90px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

h1{
    font-size:3rem;
    margin-top:10px;
    text-shadow:0 0 25px #a855f7;
}

.message{
    margin-top:25px;
    font-size:1.4rem;
    min-height:70px;
    transition:.4s;
    color:#e2e8f0;
}

.subtitle{
    margin-top:15px;
    opacity:.8;
}

.line{
    width:180px;
    height:4px;
    margin:25px auto;
    border-radius:999px;
    background:linear-gradient(90deg,#a855f7,#60a5fa);
    box-shadow:0 0 20px #a855f7;
}

.footer{
    margin-top:30px;
    opacity:.7;
    font-size:.9rem;
}

.anime-circle{
    position:absolute;
    width:420px;
    height:420px;
    border:2px solid rgba(255,255,255,.08);
    border-radius:50%;
    animation:spin 30s linear infinite;
}

.anime-circle::before{
    content:"";
    position:absolute;
    inset:20px;
    border-radius:50%;
    border:1px solid rgba(168,85,247,.2);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@media(max-width:768px){
    h1{
        font-size:2rem;
    }

    .logo{
        font-size:65px;
    }

    .message{
        font-size:1.1rem;
    }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="anime-glow"></div>
<div class="anime-circle"></div>

<div class="container">

    <div class="logo">⚔️</div>

    <h1>UNDER MAINTENANCE</h1>

    <div class="line"></div>

    <div class="message" id="message">
        Loading...
    </div>

    <div class="subtitle">
        We are improving the experience and will be back soon.
    </div>

    <div class="footer">
        ✨ Anime Inspired Maintenance Screen ✨
    </div>

</div>

<script>

// Anime-like stars
const stars = document.getElementById("stars");

for(let i=0;i<120;i++){
    const star = document.createElement("div");
    star.className = "star";

    const size = Math.random()*3+1;

    star.style.width = size+"px";
    star.style.height = size+"px";
    star.style.left = Math.random()*100+"%";
    star.style.top = Math.random()*100+"%";
    star.style.animationDuration = (Math.random()*4+2)+"s";

    stars.appendChild(star);
}

// Maintenance in many languages
const languages = [
"🔧 Website Under Maintenance",
"🔧 الموقع تحت الصيانة",
"🔧 Site en maintenance",
"🔧 Sitio en mantenimiento",
"🔧 Sito in manutenzione",
"🔧 Website in onderhoud",
"🔧 Wartungsarbeiten laufen",
"🔧 Site em manutenção",
"🔧 Сайт на обслуживании",
"🔧 网站维护中",
"🔧 網站維護中",
"🔧 サイトはメンテナンス中です",
"🔧 사이트 점검 중입니다",
"🔧 साइट रखरखाव में है",
"🔧 সাইট রক্ষণাবেক্ষণে আছে",
"🔧 Situs sedang dalam pemeliharaan",
"🔧 Laman sedang diselenggara",
"🔧 Trang web đang bảo trì",
"🔧 เว็บไซต์กำลังปรับปรุง",
"🔧 Site sedang diperbaiki",
"🔧 האתר בתחזוקה",
"🔧 الموقع قيد الصيانة",
"🔧 Web sitesi bakımda",
"🔧 Strona w konserwacji",
"🔧 Stránka je v údržbě",
"🔧 Stránka je v údržbe",
"🔧 Oldal karbantartás alatt",
"🔧 Site-ul este în mentenanță",
"🔧 Сайт в процесі обслуговування",
"🔧 Sajt je na održavanju",
"🔧 Spletna stran je v vzdrževanju",
"🔧 Saidi hooldatakse",
"🔧 Tīmekļa vietne tiek uzturēta",
"🔧 Svetainė prižiūrima",
"🔧 Viðhald á vefsíðu",
"🔧 Nettsted under vedlikehold",
"🔧 Webbplats under underhåll",
"🔧 Verkkosivusto huollossa",
"🔧 Ιστότοπος υπό συντήρηση"
];

const message = document.getElementById("message");
let index = 0;

function rotateLanguages(){
    message.style.opacity = 0;

    setTimeout(()=>{
        message.textContent = languages[index];
        message.style.opacity = 1;
        index = (index + 1) % languages.length;
    },300);
}

rotateLanguages();
setInterval(rotateLanguages,2500);

</script>

</body>
</html>
